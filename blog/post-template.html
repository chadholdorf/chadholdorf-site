<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — Chad Holdorf</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.7;
      color: #1a1a1a;
      background: #fafafa;
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    nav { margin-bottom: 2rem; font-size: 0.9rem; }
    nav a { color: #666; text-decoration: none; }
    nav a:hover { color: #1a1a1a; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; line-height: 1.2; }
    .meta { color: #666; font-size: 0.9rem; margin-bottom: 2rem; }
    .meta a { color: #666; }
    .content p { margin-bottom: 1.2rem; }
    .content h2 { margin: 2rem 0 1rem; font-size: 1.4rem; }
    .content h3 { margin: 1.5rem 0 0.75rem; font-size: 1.2rem; }
    .content blockquote {
      border-left: 3px solid #ddd;
      padding-left: 1rem;
      color: #555;
      margin: 1.5rem 0;
    }
    .content a { color: #0066cc; }
    .content ul, .content ol { margin: 1rem 0 1rem 1.5rem; }
    .content li { margin-bottom: 0.4rem; }
    .content code {
      background: #f0f0f0;
      padding: 0.15em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
    }
    .source-link {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid #eee;
      font-size: 0.85rem;
      color: #888;
    }
    .source-link a { color: #888; }
    footer {
      margin-top: 4rem;
      padding-top: 1rem;
      border-top: 1px solid #eee;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <nav><a href="/">&larr; chadholdorf.com</a> &middot; <a href="/blog">Blog</a></nav>
  <article>
    <h1>{{TITLE}}</h1>
    <div class="meta">
      {{DATE}} &middot; {{STANCE}}
    </div>
    <div class="content">
      {{CONTENT}}
    </div>
    <div class="source-link">
      Re: <a href="{{SOURCE_URL}}" target="_blank" rel="noopener">{{SOURCE_TITLE}}</a>
    </div>
  </article>
  <footer>&copy; Chad Holdorf</footer>
</body>
</html>
